name: Release to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v3.0.0)"
        required: true

jobs:
  # -----------------------------------------------------------------------
  # Build source distribution and wheels
  # -----------------------------------------------------------------------
  build:
    name: Build distribution packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify wheel contents
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # -----------------------------------------------------------------------
  # Publish to TestPyPI first
  # -----------------------------------------------------------------------
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/prinet
    permissions:
      id-token: write  # Trusted Publishing (OIDC)
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.test.pypi.org/legacy/

  # -----------------------------------------------------------------------
  # Publish to PyPI after TestPyPI succeeds
  # -----------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/prinet
    permissions:
      id-token: write  # Trusted Publishing (OIDC)
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # -----------------------------------------------------------------------
  # Create GitHub Release with release notes and dist files
  # -----------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          python - << 'EOF'
          import re, os
          with open("CHANGELOG.md") as f:
              text = f.read()
          # Extract first changelog section
          m = re.search(r"^## \[[\d.]+.*?\].*?\n(.*?)(?=^## \[|\Z)", text, re.M | re.S)
          notes = m.group(1).strip() if m else "See CHANGELOG.md for release notes."
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"notes<<EOF\n{notes}\nEOF\n")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PRINet ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
          draft: false
          prerelease: false
