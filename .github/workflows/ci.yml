name: PRINet CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHONPATH: src

jobs:
  # -----------------------------------------------------------------------
  # CPU Tests -- runs on every push/PR across Python 3.11-3.13
  # -----------------------------------------------------------------------
  test-cpu:
    name: CPU Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install ".[dev]"

      - name: Run core CPU tests
        run: |
          python -m pytest tests/test_core.py tests/test_nn.py tests/test_utils.py \
            -v --tb=short -m "not gpu" \
            --cov=prinet --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cpu
          path: coverage.xml

  # -----------------------------------------------------------------------
  # Windows CPU Tests -- validates Windows-specific behaviour
  # -----------------------------------------------------------------------
  test-windows:
    name: Windows Tests (Python 3.12)
    runs-on: windows-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install ".[dev]"

      - name: Run core tests on Windows
        run: |
          python -m pytest tests/test_core.py tests/test_nn.py tests/test_utils.py `
            -v --tb=short -m "not gpu and not slow"

  # -----------------------------------------------------------------------
  # Type Checking
  # -----------------------------------------------------------------------
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install ".[dev]"

      - name: Run mypy
        run: mypy src/prinet --strict --ignore-missing-imports

  # -----------------------------------------------------------------------
  # GPU Tests -- runs on self-hosted GPU runner
  # -----------------------------------------------------------------------
  test-gpu:
    name: GPU Tests (CUDA)
    runs-on: [self-hosted, gpu]
    if: |
      github.ref == 'refs/heads/main' ||
      contains(github.event.head_commit.message, '[gpu]') ||
      contains(github.event.pull_request.title, '[gpu]')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CUDA dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu130
          pip install ".[dev]"

      - name: Verify CUDA availability
        run: |
          python -c "
          import torch
          assert torch.cuda.is_available(), 'CUDA not available'
          print(f'PyTorch: {torch.__version__}')
          print(f'CUDA: {torch.version.cuda}')
          print(f'GPU: {torch.cuda.get_device_name(0)}')
          "

      - name: Run full test suite on GPU
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=prinet --cov-report=xml --cov-report=term-missing

      - name: Upload GPU coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-gpu
          path: coverage.xml

  # -----------------------------------------------------------------------
  # Reproducibility check -- ensure paper figures regenerate correctly
  # -----------------------------------------------------------------------
  reproducibility:
    name: Reproducibility Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install ".[dev]"

      - name: Run reproduce.py
        run: python reproduce.py --output-dir /tmp/paper_output

      - name: Verify outputs
        run: |
          ls /tmp/paper_output/figures/*.pdf | wc -l
          echo "Expected 9 figure PDFs"
